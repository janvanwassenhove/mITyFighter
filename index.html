<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Force landscape orientation on mobile -->
    <meta name="screen-orientation" content="landscape" />
    <title>mITyFighter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #1a1a2e;
      }

      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* Rotate device overlay - shown when in portrait on mobile */
      #rotate-device-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #1a1a2e;
        z-index: 9999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
      }

      #rotate-device-overlay .rotate-icon {
        font-size: 80px;
        margin-bottom: 20px;
        animation: rotate-pulse 2s ease-in-out infinite;
      }

      #rotate-device-overlay h2 {
        font-size: 24px;
        margin-bottom: 10px;
        color: #ffcc00;
      }

      #rotate-device-overlay p {
        font-size: 16px;
        color: #888888;
      }

      @keyframes rotate-pulse {
        0%, 100% { transform: rotate(0deg); opacity: 1; }
        50% { transform: rotate(90deg); opacity: 0.7; }
      }

      /* Show overlay in portrait mode on mobile devices */
      @media screen and (max-width: 1024px) and (orientation: portrait) {
        #rotate-device-overlay {
          display: flex;
        }
        #game-container {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Rotate device overlay for portrait mode -->
    <div id="rotate-device-overlay">
      <div class="rotate-icon">📱↻</div>
      <h2>Please Rotate Your Device</h2>
      <p>mITyFighter is best played in landscape mode</p>
    </div>

    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Try to lock screen orientation to landscape on supported devices
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(function() {
          // Orientation lock not supported or denied - that's okay, we show the overlay instead
        });
      }
    </script>
  </body>
</html>
