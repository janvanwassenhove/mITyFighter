# GitHub Pages deployment workflow
# Deploys main branch to root and DevoxxFighter branch to /DevoxxFighter/ sub-path

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, DevoxxFighter]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Build job — builds main (root) and DevoxxFighter (sub-path)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Main branch (root site) ──────────────────────────────
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Install dependencies (main)
        working-directory: main-branch
        run: npm ci

      - name: Lint (main)
        working-directory: main-branch
        run: npm run lint

      - name: Type check (main)
        working-directory: main-branch
        run: npm run typecheck

      - name: Tests (main)
        working-directory: main-branch
        run: npm run test

      - name: Validate assets (main)
        working-directory: main-branch
        run: npm run validate:assets
        continue-on-error: true

      - name: Build main
        working-directory: main-branch
        run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      # ── DevoxxFighter branch (sub-path /DevoxxFighter/) ─────
      - name: Checkout DevoxxFighter branch
        uses: actions/checkout@v4
        with:
          ref: DevoxxFighter
          path: dev-branch

      - name: Install dependencies (DevoxxFighter)
        working-directory: dev-branch
        run: npm ci

      - name: Lint (DevoxxFighter)
        working-directory: dev-branch
        run: npm run lint

      - name: Type check (DevoxxFighter)
        working-directory: dev-branch
        run: npm run typecheck

      - name: Tests (DevoxxFighter)
        working-directory: dev-branch
        run: npm run test

      - name: Validate assets (DevoxxFighter)
        working-directory: dev-branch
        run: npm run validate:assets
        continue-on-error: true

      - name: Build DevoxxFighter
        working-directory: dev-branch
        run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/DevoxxFighter/

      # ── Assemble combined deployment ────────────────────────
      - name: Assemble deployment directory
        run: |
          mkdir -p deploy/DevoxxFighter
          cp -r main-branch/dist/* deploy/
          cp -r dev-branch/dist/* deploy/DevoxxFighter/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
